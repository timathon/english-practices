<!DOCTYPE html>

    <!-- Tailwind CSS CDN -->

    <script>

                            light: '#4f46e5',
                            dark: '#6366f1',

            transition: background-color 0.3s ease, color 0.3s ease;

            font-family: 'Georgia', serif;
            line-height: 1.8;
        }
        /* Custom scrollbar for beautiful UI */
        ::-webkit-scrollbar {
            width: 6px;

        ::-webkit-scrollbar-track {
            background: transparent;

            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col antialiased">

    <!-- Top Navigation Bar -->
    <header id="main-header" class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="back-btn" class="hidden hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200 border border-slate-200 dark:border-slate-800">
                    ←
                </button>
                <div>
                    <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-400">
                        七年级下册 - 阅读与表达
                    </h1>
                    <p id="sub-title" class="text-xs text-slate-400 dark:text-slate-500">SmartEdu Workbook</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="w-10 h-10 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-200">
                    🌓
                </button>
                <a id="home-btn" href="../../index.html" class="hidden sm:inline-flex text-xs font-semibold px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition">
                    返回首页
                </a>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main id="main-content" class="flex-grow flex flex-col max-w-7xl w-full mx-auto px-3 md:px-4 py-3 md:py-6">
        <!-- Loader -->
        <div id="loader" class="flex-grow flex items-center justify-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent dark:border-indigo-400 dark:border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">加载资源中，请稍候...</p>
            </div>
        </div>

        <!-- Dashboard View (Initial state) -->
        <div id="dashboard-view" class="hidden flex-grow flex flex-col gap-6">
            <!-- Overall Stats Banner -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 bg-gradient-to-r from-indigo-600/10 to-violet-500/10 border border-indigo-100 dark:border-indigo-900/30 rounded-3xl p-6">
                <div class="flex flex-col justify-center">
                    <span class="text-xs font-bold uppercase tracking-wider text-indigo-600 dark:text-indigo-400">通关进度</span>
                    <span id="mastery-percent" class="text-3xl font-extrabold mt-1 text-slate-800 dark:text-slate-100">0%</span>
                    <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full mt-2 overflow-hidden">
                        <div id="mastery-progress-bar" class="bg-gradient-to-r from-indigo-600 to-violet-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div class="flex items-center gap-4 border-t sm:border-t-0 sm:border-l border-slate-200 dark:border-slate-800 pt-4 sm:pt-0 sm:pl-6">
                    <div class="w-12 h-12 bg-indigo-500/10 rounded-2xl flex items-center justify-center text-xl text-indigo-600 dark:text-indigo-400">📝</div>
                    <div>
                        <p class="text-2xl font-bold text-slate-800 dark:text-slate-100" id="total-attempts">0次</p>
                        <p class="text-xs text-slate-400">累计练习次数</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 border-t sm:border-t-0 sm:border-l border-slate-200 dark:border-slate-800 pt-4 sm:pt-0 sm:pl-6">
                    <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-xl text-emerald-500 dark:text-emerald-400">🏆</div>
                    <div>
                        <p class="text-2xl font-bold text-slate-800 dark:text-slate-100" id="mastered-count">0 / 15</p>
                        <p class="text-xs text-slate-400">满分通关篇章数</p>
                    </div>
                </div>
            </div>

            <!-- Dashboard Controls -->
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">


                <!-- Tabs Filter -->
                <div class="flex gap-1.5 bg-slate-200/60 dark:bg-slate-900/60 p-1.5 rounded-2xl w-full sm:w-auto">
                    <button class="filter-tab active flex-1 sm:flex-initial text-center text-xs font-semibold px-4 py-2 rounded-xl transition" data-filter="all">全部</button>
                    <button class="filter-tab flex-1 sm:flex-initial text-center text-xs font-semibold px-4 py-2 rounded-xl transition text-slate-500" data-filter="completed">满分通关</button>
                    <button class="filter-tab flex-1 sm:flex-initial text-center text-xs font-semibold px-4 py-2 rounded-xl transition text-slate-500" data-filter="inprogress">进行中</button>
                    <button class="filter-tab flex-1 sm:flex-initial text-center text-xs font-semibold px-4 py-2 rounded-xl transition text-slate-500" data-filter="unstarted">未开始</button>
                </div>
            </div>

            <!-- Grid Passage Cards -->
            <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Practice View (Split screen design) -->
        <div id="practice-view" class="hidden flex-grow flex flex-col md:flex-row gap-4 md:gap-6 relative">
            <!-- Left Pane: Passage Reading Pane -->
            <div class="w-full md:w-1/2 flex flex-col bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm h-[40vh] md:h-[calc(100vh-10rem)] overflow-hidden">
                <div class="px-4 md:px-6 py-3 md:py-4 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between shrink-0">
                    <div class="flex items-center gap-2">
                        <span id="practice-unit-badge" class="bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-400 text-xs font-bold px-2.5 py-1 rounded-lg"></span>
                        <span class="text-xs text-slate-400 dark:text-slate-500" id="word-count"></span>
                    </div>
                    <div class="text-xs text-slate-500 font-semibold flex items-center gap-1">
                        ⏱️ <span id="timer">00:00</span>
                    </div>
                </div>
                
                <div class="flex-grow p-4 md:p-6 overflow-y-auto">
                    <h2 id="practice-title" class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100"></h2>
                    <div id="practice-passage" class="passage-text text-base text-slate-700 dark:text-slate-300 space-y-4"></div>
                </div>
            </div>

            <!-- Right Pane: Questions Pane -->
            <div class="w-full md:w-1/2 flex flex-col bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm flex-grow h-0 md:h-[calc(100vh-10rem)] overflow-hidden">
                <div class="px-4 md:px-6 py-3 md:py-4 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between shrink-0">
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-bold text-slate-800 dark:text-slate-200">真题问答</span>
                        <div class="flex items-center gap-1.5">
                            <button id="prev-question-btn" class="w-7 h-7 flex items-center justify-center border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-xs transition duration-200 focus:outline-none disabled:opacity-40 disabled:hover:bg-transparent">
                                ◀️
                            </button>
                            <button id="next-question-btn" class="w-7 h-7 flex items-center justify-center border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-xs transition duration-200 focus:outline-none disabled:opacity-40 disabled:hover:bg-transparent">
                                ▶️
                            </button>
                        </div>
                    </div>
                    <!-- Progress Bar segments -->
                    <div id="questions-progress-bar" class="flex items-center gap-1.5"></div>
                </div>

                <div id="questions-container" class="flex-grow p-4 md:p-6 overflow-y-auto">
                    <!-- Standard Questions Q41, Q42, Q43 -->
                    <div id="mc-questions-section"></div>

                    <!-- Sentence Ordering Question Q44 -->
                    <div id="so-question-section" class="hidden">

                        <h4 id="so-q-prompt" class="font-bold text-slate-800 dark:text-slate-200 text-base leading-relaxed mb-3"></h4>
                        
                        <!-- Dynamic Hint Card -->
                        <div id="hint-card" class="hidden mb-4 p-4 bg-indigo-50/60 dark:bg-indigo-900/10 border border-indigo-100/50 dark:border-indigo-900/20 text-xs text-indigo-700 dark:text-indigo-400 rounded-2xl relative">
                            <button id="close-hint" class="absolute top-2.5 right-2.5 hover:text-slate-800">✕</button>
                            <strong>编写指南/提示：</strong>
                            <p id="so-q-hint" class="mt-1 leading-relaxed"></p>
                        </div>

                        <!-- Target ordering slots -->
                        <div class="mb-4">
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">您的作答区 (点击方块返回下方候选区):</label>
                            <div id="so-target-zone" class="min-h-[140px] p-4 bg-slate-50 dark:bg-slate-950 border border-dashed border-slate-300 dark:border-slate-800 rounded-2xl flex flex-col gap-2 transition-all">
                                <p class="text-xs text-slate-400 text-center m-auto" id="target-placeholder">请从下方选择词块进行排序...</p>
                            </div>
                        </div>

                        <!-- Candidate options block pool -->
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">备选词块候选区 (点击词块放入上方作答区):</label>
                            <div id="so-pool-zone" class="flex flex-col gap-2 p-3 bg-slate-50/50 dark:bg-slate-950/40 border border-slate-200 dark:border-slate-800/80 rounded-2xl"></div>
                        </div>
                    </div>
                </div>

                <div class="px-4 md:px-6 py-3 md:py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end shrink-0">
                    <!-- Right: Cancel/Submit Buttons -->
                    <div class="flex items-center gap-2">
                        <button id="cancel-practice-btn" class="px-4 py-2 text-xs font-semibold border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition">放弃</button>
                        <button id="submit-practice-btn" class="bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white px-6 py-2 rounded-xl text-xs font-semibold shadow-md shadow-indigo-600/10 hover:shadow-indigo-600/20 transition-all duration-200">
                            提交作答
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Exit Confirmation Modal (Glassmorphic) -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl w-full max-w-sm shadow-2xl p-6 text-center transform scale-95 transition-transform duration-300">
            <div class="w-12 h-12 rounded-full bg-amber-50 dark:bg-amber-950/20 text-amber-500 flex items-center justify-center text-xl font-bold mx-auto mb-4">
                ⚠️
            </div>
            <h3 class="text-base font-bold text-slate-800 dark:text-slate-100 mb-2">确认退出当前练习？</h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 mb-6 leading-relaxed">您的本次作答进度将不会被保存，确定要放弃本次练习吗？</p>
            <div class="flex gap-3 justify-center">
                <button id="confirm-cancel-btn" class="px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl text-xs font-semibold transition">
                    取消
                </button>
                <button id="confirm-exit-btn" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-xl text-xs font-semibold shadow-md shadow-rose-500/10 transition-all">
                    确认退出
                </button>
            </div>
        </div>
    </div>

    <!-- Results Modal (Glassmorphic) -->
    <div id="results-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col h-[80vh] md:h-auto md:max-h-[90vh]">
            <div class="p-6 text-center border-b border-slate-100 dark:border-slate-800 flex flex-col items-center shrink-0">
                <!-- Score Indicator -->
                <div class="w-24 h-24 rounded-full flex items-center justify-center border-4 text-3xl font-extrabold mb-4" id="modal-score-ring">
                    <span id="modal-score">0</span><span class="text-base text-slate-400">/10</span>
                </div>
                
                <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100" id="modal-title">练习报告</h3>
                <p id="modal-verdict" class="text-sm font-semibold mt-1 text-indigo-600 dark:text-indigo-400"></p>
            </div>

            <!-- Score breakdowns -->
            <div class="p-6 flex-grow overflow-y-auto space-y-4 md:max-h-[400px]" id="modal-details"></div>

            <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between shrink-0">
                <span class="text-xs text-slate-400" id="modal-time-taken">耗时: 00:00</span>
                <div class="flex gap-2">
                    <button id="modal-retry-btn" class="px-4 py-2 text-xs font-semibold border border-slate-200 dark:border-slate-800 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition">重新练习</button>
                    <button id="modal-close-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-xs font-semibold shadow-md transition">返回大厅</button>
                </div>
            </div>
        </div>
    </div>

    <!-- IndexedDB and SPA Controller logic -->
    <script>
        const DB_NAME = 'SmartEduREWorkbook';
        const DB_VERSION = 1;
        const STORE_NAME = 'practice_records';
        
        let db = null;
        let userStats = {}; // Cache of statistics per passage
        let currentPassage = null;
        let practiceTimer = null;
        let secondsElapsed = 0;
        let currentAnswers = {}; // Map of question ID to selected answer (index or array of IDs)
        let selectedBlocks = []; // For sentence ordering (b1, b2, etc.)
        let activeQuestionIdx = 0; // Active question tab index (0 to 3)
        let currentFilter = 'all';
        let searchQuery = '';

        // 1. Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // 2. IndexedDB Setup
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = (e) => reject('Database failed to open: ' + e.target.error);
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        function loadStats() {
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    userStats = {};
                    request.result.forEach(record => {
                        userStats[record.id] = record;
                    });
                    resolve();
                };
                request.onerror = () => {
                    console.error('Failed to load practice stats.');
                    resolve();
                };
            });
        }

        function saveRecord(passageId, score, timeTaken) {
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                
                const existing = userStats[passageId] || {
                    id: passageId,
                    attempts: 0,
                    best_score: 0,
                    last_score: 0,
                    history: []
                };

                existing.attempts += 1;
                existing.last_score = score;
                if (score > existing.best_score) {
                    existing.best_score = score;
                }
                existing.last_practiced = new Date().toISOString();
                existing.history.push({
                    score: score,
                    time_taken: timeTaken,
                    date: existing.last_practiced
                });

                const request = store.put(existing);
                request.onsuccess = () => {
                    userStats[passageId] = existing;
                    resolve();
                };
            });
        }

        // 3. UI Helpers
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function calculateWordCount(text) {
            return text.trim().split(/\s+/).length;
        }

        // 4. Timer Functions
        function startTimer() {
            secondsElapsed = 0;
            document.getElementById('timer').textContent = '00:00';
            clearInterval(practiceTimer);
            practiceTimer = setInterval(() => {
                secondsElapsed++;
                document.getElementById('timer').textContent = formatTime(secondsElapsed);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(practiceTimer);
        }

        // 5. Dashboard View Render
        function renderDashboard() {
            // Stats Calculations
            let totalAttempts = 0;
            let masteredCount = 0;
            
            PASSAGES_DATA.forEach(p => {
                const stat = userStats[p.id];
                if (stat) {
                    totalAttempts += stat.attempts;
                    if (stat.best_score === 10) masteredCount++;
                }
            });

            document.getElementById('total-attempts').textContent = `${totalAttempts}次`;
            document.getElementById('mastered-count').textContent = `${masteredCount} / 15`;
            
            const masteryPercent = Math.round((masteredCount / 15) * 100);
            document.getElementById('mastery-percent').textContent = `${masteryPercent}%`;
            document.getElementById('mastery-progress-bar').style.width = `${masteryPercent}%`;

            // Filter & Render Cards
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';

            const filteredData = PASSAGES_DATA.filter(p => {
                const stat = userStats[p.id];
                const matchesSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      p.unit.toLowerCase().includes(searchQuery.toLowerCase());
                
                if (!matchesSearch) return false;

                if (currentFilter === 'completed') {
                    return stat && stat.best_score === 10;
                } else if (currentFilter === 'inprogress') {
                    return stat && stat.attempts > 0 && stat.best_score < 10;
                } else if (currentFilter === 'unstarted') {
                    return !stat || stat.attempts === 0;
                }
                return true;
            });

            if (filteredData.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 flex flex-col items-center justify-center bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl">
                        <span class="text-3xl mb-2">📁</span>
                        <p class="text-sm font-semibold text-slate-400">没有找到匹配的练习题...</p>
                    </div>
                `;
                return;
            }

            filteredData.forEach(p => {
                const stat = userStats[p.id];
                const attempts = stat ? stat.attempts : 0;
                const bestScore = stat ? stat.best_score : 0;
                const progressWidth = Math.round((bestScore / 10) * 100);

                let badgeHtml = '';
                if (attempts === 0) {
                    badgeHtml = '<span class="bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400 text-[10px] font-bold px-2 py-0.5 rounded-md">未开始</span>';
                } else if (bestScore === 10) {
                    badgeHtml = '<span class="bg-emerald-100 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-md">已通关</span>';
                } else {
                    badgeHtml = '<span class="bg-amber-100 text-amber-700 dark:bg-amber-950/40 dark:text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded-md">进行中</span>';
                }

                const lastPracticedStr = stat && stat.last_practiced 
                    ? new Date(stat.last_practiced).toLocaleDateString('zh-CN', {month: 'numeric', day: 'numeric', hour: 'numeric', minute:'2-digit'})
                    : '从无记录';

                const card = document.createElement('div');
                card.className = 'group flex flex-col bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-indigo-500/50 dark:hover:border-indigo-400/50 rounded-3xl p-6 shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer hover:-translate-y-0.5';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-3 shrink-0">

        // Interactive Sentence Highlighter
        function wrapSentences(paragraph) {
            const sentenceRegex = /(?:Mr\.|Mrs\.|Ms\.|Dr\.|U\.K\.|U\.S\.|a\.m\.|p\.m\.|[^.!?])+[.!?]+["']?|(?:Mr\.|Mrs\.|Ms\.|Dr\.|U\.K\.|U\.S\.|a\.m\.|p\.m\.|[^.!?])+$/ig;
            const sentences = paragraph.match(sentenceRegex);
            if (!sentences) return paragraph;
            
            return sentences.map(s => {
                if (!s.trim()) return s;
                return `<span class="sentence-highlight cursor-pointer transition-colors duration-200 rounded py-0.5" onclick="highlightSentence(this)">${s}</span>`;
            }).join('');
        }

        function highlightSentence(element) {
            document.querySelectorAll('.sentence-highlight').forEach(el => {
                el.classList.remove('bg-indigo-600', 'dark:bg-indigo-400', 'text-white', 'dark:text-slate-900');
            });
            element.classList.add('bg-indigo-600', 'dark:bg-indigo-400', 'text-white', 'dark:text-slate-900');
        }

        // 6. Practice View Setup
        function startPractice(passageId) {
            currentPassage = PASSAGES_DATA.find(p => p.id === passageId);
            if (!currentPassage) return;

            currentAnswers = {};
            selectedBlocks = [];
            activeQuestionIdx = 0;

            // Update Views
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('practice-view').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('main-header').classList.add('hidden', 'md:block');
            const homeBtn = document.getElementById('home-btn');
            if (homeBtn) {
                homeBtn.classList.add('hidden');
                homeBtn.classList.remove('sm:inline-flex');
            }
            
            // Header stats
            document.getElementById('practice-unit-badge').textContent = currentPassage.unit;
            document.getElementById('word-count').textContent = `📊 单词数: ${calculateWordCount(currentPassage.passage)} 词`;
            document.getElementById('practice-title').textContent = currentPassage.title;
            
            // Display Reading Passage
            const passageBox = document.getElementById('practice-passage');
            passageBox.innerHTML = currentPassage.passage.split('\n\n').map(p => `<p class="mb-4">${wrapSentences(p)}</p>`).join('');

            // Render Questions
            renderQuestions();

            // Set up Q44 Sentence Ordering pool
            const q44 = currentPassage.questions.find(q => q.type === 'sentence-ordering');
            if (q44) {
                document.getElementById('so-q-prompt').textContent = `44. ${q44.prompt}`;
                document.getElementById('so-q-hint').textContent = q44.hint;
                
                // Close/Hide hint card initially
                document.getElementById('hint-card').classList.add('hidden');

                // Pool Setup with Shuffled blocks
                const poolZone = document.getElementById('so-pool-zone');
                poolZone.innerHTML = '';

                // Shuffle the blocks array copy to randomize layout representation
                const shuffledBlocks = [...q44.blocks].sort(() => Math.random() - 0.5);
                
                shuffledBlocks.forEach(block => {
                    const blockBtn = document.createElement('button');
                    blockBtn.id = `block-${block.id}`;
                    blockBtn.className = 'w-full text-left text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-indigo-400 dark:hover:border-indigo-500 rounded-xl px-4 py-3 shadow-sm transition hover:shadow duration-200 focus:outline-none flex items-center justify-between';
                    blockBtn.innerHTML = `
                        <span class="text-slate-700 dark:text-slate-300 font-semibold leading-relaxed">${block.text}</span>
                        <span class="text-sm text-indigo-500 font-bold ml-2 shrink-0">＋</span>
                    `;
                    blockBtn.addEventListener('click', () => moveBlockToTarget(block.id));
                    poolZone.appendChild(blockBtn);
                });

                updateTargetZone();
            }

            // Initialize active question and progress bar
            setActiveQuestion(0);

            // Start Session Timer
            startTimer();

        function renderQuestions() {
            const mcContainer = document.getElementById('mc-questions-section');
            mcContainer.innerHTML = '';

            const mcQuestions = currentPassage.questions.filter(q => q.type === 'multiple-choice');
            
            mcQuestions.forEach((q, idx) => {
                const qBox = document.createElement('div');
                qBox.id = `mc-question-box-${q.id}`;
                qBox.className = 'space-y-2 md:space-y-3 hidden';
                qBox.innerHTML = `
                    <h4 class="font-bold text-slate-800 dark:text-slate-200 text-base leading-relaxed">${q.number}. ${q.prompt}</h4>
                    <div class="grid grid-cols-1 gap-2 md:gap-2.5 mt-1.5 md:mt-2" id="options-for-${q.id}"></div>
                `;

                const optBox = qBox.querySelector(`#options-for-${q.id}`);
                q.options.forEach((opt, optIdx) => {
                    const btn = document.createElement('button');
                    btn.className = 'text-left text-sm w-full bg-slate-50 dark:bg-slate-950 hover:bg-slate-100 dark:hover:bg-slate-800/80 border border-slate-200 dark:border-slate-800 px-4 py-2.5 md:py-3.5 rounded-xl transition-all duration-200 flex items-center gap-3 focus:outline-none';
                    btn.innerHTML = `
                        <span class="w-7 h-7 shrink-0 rounded-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 flex items-center justify-center font-bold text-xs text-slate-400 group-hover:border-indigo-400">${String.fromCharCode(65 + optIdx)}</span>
                        <span class="text-slate-700 dark:text-slate-300 font-semibold leading-relaxed">${opt}</span>
                    `;
                    btn.addEventListener('click', () => selectMCOption(q.id, optIdx, btn));
                    optBox.appendChild(btn);
                });

                mcContainer.appendChild(qBox);
            });
        }

        function selectMCOption(qId, index, clickedBtn) {
            currentAnswers[qId] = index;
            
            const optionsBox = document.getElementById(`options-for-${qId}`);
            Array.from(optionsBox.children).forEach(btn => {
                btn.className = 'text-left text-sm w-full bg-slate-50 dark:bg-slate-950 hover:bg-slate-100 dark:hover:bg-slate-800/80 border border-slate-200 dark:border-slate-800 px-4 py-2.5 md:py-3.5 rounded-xl transition-all duration-200 flex items-center gap-3 focus:outline-none';
                btn.querySelector('span:first-child').className = 'w-7 h-7 shrink-0 rounded-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 flex items-center justify-center font-bold text-xs text-slate-400';
            });

            clickedBtn.className = 'text-left text-sm w-full bg-indigo-50/50 dark:bg-indigo-950/20 border-2 border-indigo-500 px-4 py-2.5 md:py-3.5 rounded-xl transition-all duration-200 flex items-center gap-3 focus:outline-none';
            clickedBtn.querySelector('span:first-child').className = 'w-7 h-7 shrink-0 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-xs';
            updateProgressBar();
        }

        function setActiveQuestion(idx) {
            if (idx < 0 || idx > 3) return;
            activeQuestionIdx = idx;
            
            const mcContainer = document.getElementById('mc-questions-section');
            const soContainer = document.getElementById('so-question-section');
            
            const mcQuestions = currentPassage.questions.filter(q => q.type === 'multiple-choice');
            mcQuestions.forEach((q, qIdx) => {
                const qBox = document.getElementById(`mc-question-box-${q.id}`);
                if (qBox) {
                    if (qIdx === idx) {
                        qBox.classList.remove('hidden');
                    } else {
                        qBox.classList.add('hidden');
                    }
                }
            });
            
            if (idx < 3) {
                mcContainer.classList.remove('hidden');
                soContainer.classList.add('hidden');
            } else {
                mcContainer.classList.add('hidden');
                soContainer.classList.remove('hidden');
            }
            
            const prevBtn = document.getElementById('prev-question-btn');
            const nextBtn = document.getElementById('next-question-btn');
            if (prevBtn) prevBtn.disabled = (idx === 0);
            if (nextBtn) nextBtn.disabled = (idx === 3);
            
            updateProgressBar();
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('questions-progress-bar');
            if (!progressBar || !currentPassage) return;
            progressBar.innerHTML = '';
            
            let allAnswered = true;
            const questions = currentPassage.questions;
            questions.forEach((q, idx) => {
                const segment = document.createElement('div');
                
                let isAnswered = false;
                if (q.type === 'multiple-choice') {
                    isAnswered = (currentAnswers[q.id] !== undefined);
                } else if (q.type === 'sentence-ordering') {
                    isAnswered = (selectedBlocks && selectedBlocks.length === 3);
                }
                
                if (!isAnswered) allAnswered = false;
                
                let baseClass = 'w-7 h-2.5 rounded-full cursor-pointer transition-all duration-300 border shadow-sm ';
                if (isAnswered) {
                    baseClass += 'bg-indigo-600 dark:bg-indigo-500 border-indigo-600 dark:border-indigo-500';
                } else {
                    baseClass += 'bg-white dark:bg-slate-900 border-slate-300 dark:border-slate-700';
                }
                
                if (idx === activeQuestionIdx) {
                    baseClass += ' ring-2 ring-offset-2 ring-indigo-500 dark:ring-offset-slate-900';
                }
                
                segment.className = baseClass;
                segment.title = `Question ${q.number}`;
                segment.addEventListener('click', () => {
                    setActiveQuestion(idx);
                });
                
                progressBar.appendChild(segment);
            });

            // Toggle submit button state
            const submitBtn = document.getElementById('submit-practice-btn');
            if (submitBtn) {
                if (allAnswered) {
                    submitBtn.disabled = false;
                    submitBtn.className = 'bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white px-6 py-2 rounded-xl text-xs font-semibold shadow-md shadow-indigo-600/10 hover:shadow-indigo-600/20 transition-all duration-200 cursor-pointer';
                } else {
                    submitBtn.disabled = true;
                    submitBtn.className = 'bg-slate-200 dark:bg-slate-800/80 text-slate-400 dark:text-slate-500 px-6 py-2 rounded-xl text-xs font-semibold transition-all duration-200 cursor-not-allowed';
                }
            }
        }

        // 7. Q44 Block Movement Functions
        function moveBlockToTarget(blockId) {
            const q44 = currentPassage.questions.find(q => q.type === 'sentence-ordering');
            const block = q44.blocks.find(b => b.id === blockId);
            
            if (!selectedBlocks.includes(blockId)) {
                selectedBlocks.push(blockId);
                // Hide pool item visually or disable it
                const poolItem = document.getElementById(`block-${blockId}`);
                poolItem.classList.add('opacity-40', 'pointer-events-none');
                poolItem.querySelector('span:last-child').textContent = '✓';
            }
            updateTargetZone();
        }

        function removeBlockFromTarget(blockId) {
            selectedBlocks = selectedBlocks.filter(id => id !== blockId);
            
            const poolItem = document.getElementById(`block-${blockId}`);
            if (poolItem) {
                poolItem.classList.remove('opacity-40', 'pointer-events-none');
                poolItem.querySelector('span:last-child').textContent = '＋';
            }
            updateTargetZone();
        }

        function updateTargetZone() {
            const targetZone = document.getElementById('so-target-zone');
            const placeholder = document.getElementById('target-placeholder');
            
            // Clean dynamic blocks, leave placeholder
            Array.from(targetZone.querySelectorAll('.dynamic-block')).forEach(el => el.remove());

            if (selectedBlocks.length === 0) {
                placeholder.classList.remove('hidden');
                updateProgressBar();
                return;
            }

            placeholder.classList.add('hidden');
            
            const q44 = currentPassage.questions.find(q => q.type === 'sentence-ordering');
            
            selectedBlocks.forEach((blockId, index) => {
                const block = q44.blocks.find(b => b.id === blockId);
                const blockEl = document.createElement('div');
                blockEl.className = 'dynamic-block w-full text-left text-sm bg-indigo-50/50 dark:bg-indigo-950/20 border-2 border-indigo-200 dark:border-indigo-800/40 rounded-xl px-4 py-3 shadow-sm transition hover:bg-rose-50/20 hover:border-rose-400 dark:hover:border-rose-900 duration-200 flex items-center justify-between cursor-pointer';
                blockEl.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-6 h-6 shrink-0 rounded-full bg-indigo-200 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 font-bold text-[10px] flex items-center justify-center">${index + 1}</span>
                        <span class="text-slate-700 dark:text-slate-200 font-semibold leading-relaxed">${block.text}</span>
                    </div>
                    <span class="text-xs text-rose-500 font-bold ml-2 shrink-0">✕</span>
                `;
                blockEl.addEventListener('click', () => removeBlockFromTarget(blockId));
                targetZone.appendChild(blockEl);
            });
            updateProgressBar();
        }

        // 8. Practice Submit & Scoring Logic
        document.getElementById('submit-practice-btn').addEventListener('click', () => {
            // Validate all questions answered
            const mcQuestions = currentPassage.questions.filter(q => q.type === 'multiple-choice');
            let unanswered = [];
            
            mcQuestions.forEach(q => {
                if (currentAnswers[q.id] === undefined) unanswered.push(q.number);
            });

            if (unanswered.length > 0) {
                alert(`请回答细节选择题：第 ${unanswered.join(', ')} 题未选择作答。`);
                return;
            }

            if (selectedBlocks.length === 0) {
                if (!confirm('第44题开放表达未放置任何句子词块，确定直接提交吗？')) return;
            }

            stopTimer();
            scorePractice();
        });

        function scorePractice() {
            let totalScore = 0;
            const mcQuestions = currentPassage.questions.filter(q => q.type === 'multiple-choice');
            const detailsList = [];

            // 1. Scoring Multiple Choices (2 points each)
            mcQuestions.forEach(q => {
                const userAnsIndex = currentAnswers[q.id];
                const isCorrect = userAnsIndex === q.answer;
                if (isCorrect) totalScore += 2;

                detailsList.push({
                    number: q.number,
                    type: 'multiple-choice',
                    prompt: q.prompt,
                    isCorrect: isCorrect,
                    pointsGained: isCorrect ? 2 : 0,
                    maxPoints: 2,
                    userAnswerText: q.options[userAnsIndex] || '未作答',
                    correctAnswerText: q.options[q.answer]
                });
            });

            // 2. Scoring Sentence Ordering Q44 (4 points)
            const q44 = currentPassage.questions.find(q => q.type === 'sentence-ordering');
            let isQ44Correct = false;
            
            if (q44) {
                // Check if user selected exactly the 3 correct blocks in the correct chronological order
                const correctOrder = q44.correctOrder;
                const isMatched = selectedBlocks.length === correctOrder.length && 
                                  selectedBlocks.every((val, index) => val === correctOrder[index]);
                
                if (isMatched) {
                    totalScore += 4;
                    isQ44Correct = true;
                }

                // Compile readable order string
                const userOrderTexts = selectedBlocks.map((id, index) => {
                    const blockObj = q44.blocks.find(b => b.id === id);
                    return `(${index + 1}) ${blockObj.text}`;
                }).join('<br>');

                const correctOrderTexts = correctOrder.map((id, index) => {
                    const blockObj = q44.blocks.find(b => b.id === id);
                    return `(${index + 1}) ${blockObj.text}`;
                }).join('<br>');

                detailsList.push({
                    number: 44,
                    type: 'sentence-ordering',
                    prompt: q44.prompt,
                    isCorrect: isMatched,
                    pointsGained: isMatched ? 4 : 0,
                    maxPoints: 4,
                    userAnswerText: userOrderTexts || '未排序作答',
                    correctAnswerText: correctOrderTexts
                });
            }

            // Save to database
            saveRecord(currentPassage.id, totalScore, secondsElapsed).then(() => {
                showResultsModal(totalScore, secondsElapsed, detailsList);
            });
        }

        // 9. Results Modal Display

                verdict.textContent = '👍 优秀！恭喜你顺利通关！';

                        ${!item.isCorrect ? `<p class="text-sm text-slate-400 mt-0.5">标准答案: <span class="text-slate-600 dark:text-slate-300 font-semibold">${item.correctAnswerText}</span></p>` : ''}

                        </div>

                    <div class="flex items-center justify-between">

                    alert('IndexedDB Initialization failed! Records will not save offline: ' + err);
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dashboard-view').classList.remove('hidden');
                    renderDashboard();
                });
        });
    </script>
</body>
</html>
