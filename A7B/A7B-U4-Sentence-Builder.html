<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 4: Eat Well - Sentence Builder</title>
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #ff9600; /* Orange for food theme */
            --secondary-dark: #cc7800;
            --warning: #ffc800;
            --warning-dark: #e5b400;
            --danger: #ff4b4b;
            --danger-dark: #d33131;
            --neutral: #e5e5e5;
            --text: #4b4b4b;
            --white: #ffffff;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        #app {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 600px) {
            #app {
                min-height: 90vh;
                border-radius: 20px;
                overflow: hidden;
            }
        }

        /* --- Screens --- */
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; flex-grow: 1; }
        .screen.active { display: flex; }

        /* --- Home Screen --- */
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--secondary); margin: 0; font-size: 2.2rem; }

        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
        }
        h2 { font-size: 1.1rem; color: #999; margin-top: 5px; font-weight: normal; }

        .challenge-grid {
            display: grid;
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 80px; 
        }

        .challenge-card {
            background: var(--white);
            border: 2px solid var(--neutral);
            border-bottom: 4px solid var(--neutral);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }
        .challenge-card:active { transform: translateY(2px); border-bottom-width: 2px; }
        .challenge-card:hover { background-color: #fafafa; border-color: #ccc; }

        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin: 0; }
        
        .card-stats { 
            font-size: 0.8rem; 
            color: #777; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-top: 10px; 
            background: #f8f9fa; 
            padding: 10px 12px; 
            border-radius: 12px; 
            border: 1px solid #eee;
        }
        .stat-row { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start;
        }
        .stat-row:last-child {
            align-items: flex-end; 
        }
        
        .stat-label { font-weight: bold; color: #aaa; font-size: 0.7rem; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; }
        .stat-val { color: var(--text); font-weight: 600; font-size: 0.9rem; }

        /* --- Game Screen --- */
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { font-size: 1.5rem; cursor: pointer; color: #ccc; background: none; border: none; }

        .progress-container {
            flex-grow: 1; margin: 0 15px; height: 16px; background-color: var(--neutral);
            border-radius: 8px; display: flex; overflow: hidden;
        }
        .progress-segment { flex-grow: 1; border-right: 1px solid var(--white); }
        .progress-segment.green { background-color: var(--primary); }
        .progress-segment.yellow { background-color: var(--warning); }
        .progress-segment.red { background-color: var(--danger); }

        .question-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        .prompt-container { text-align: center; margin-bottom: 20px; }
        .prompt-cn { font-size: 1.3rem; color: #333; font-weight: bold; margin-bottom: 5px; }
        .prompt-hint-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--warning); filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); transition: transform 0.2s; }
        .prompt-hint-btn:hover { transform: scale(1.1); }
        .hint-text { font-size: 0.9rem; color: #666; font-style: italic; margin-top: 5px; min-height: 1.2em; visibility: hidden; }
        .hint-text.visible { visibility: visible; animation: fadeIn 0.3s; }

        .answer-area {
            min-height: 70px;
            border-top: 2px solid var(--neutral);
            border-bottom: 2px solid var(--neutral);
            background: #fafafa;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .word-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }

        /* Word Buttons */
        .word-btn {
            background: var(--white);
            border: 2px solid var(--neutral);
            border-bottom: 4px solid var(--neutral);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text);
            position: relative;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .word-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        .word-btn.selected { background: var(--neutral); color: transparent; border-color: transparent; pointer-events: none; }
        .word-btn.selected .ipa { display: none; } 

        .word-btn-answer {
            background: var(--white);
            border: 2px solid var(--secondary);
            border-bottom: 4px solid var(--secondary-dark);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--secondary-dark);
        }
        
        .ipa { font-size: 0.75rem; color: #999; font-weight: normal; margin-top: 2px; }

        /* Footer & Feedback */
        .footer-action { padding-top: 20px; border-top: 2px solid var(--neutral); }
        
        .check-btn {
            width: 100%; padding: 15px; border-radius: 16px; font-size: 1.2rem; font-weight: bold;
            color: white; background-color: var(--primary); border: none; border-bottom: 5px solid var(--primary-dark);
            cursor: pointer; text-transform: uppercase;
        }
        .check-btn:active { transform: translateY(2px); border-bottom-width: 3px; }
        .check-btn:disabled { background-color: var(--neutral); border-bottom-color: #ccc; color: #999; cursor: not-allowed; transform: none; }
        .check-btn.wrong { background-color: var(--danger); border-bottom-color: var(--danger-dark); animation: shake 0.5s; }
        .check-btn.correct { background-color: var(--primary); animation: bounce 0.5s; }

        .feedback-area {
            height: 110px; 
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            visibility: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .feedback-area.visible { visibility: visible; }
        .feedback-area.correct { background: #d7ffb8; border: 2px solid #58cc02; }
        .feedback-area.wrong { background: #ffdfe0; border: 2px solid #ff4b4b; }
        
        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 500px; max-height: 80vh;
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .log-list { overflow-y: auto; flex-grow: 1; border: 1px solid #eee; margin-bottom: 15px; padding: 5px; }
        .mistake-item { padding: 10px; border-bottom: 1px solid #eee; }
        .mistake-item:last-child { border-bottom: none; }
        .fail-count { background: var(--danger); color: white; border-radius: 10px; padding: 2px 6px; font-size: 0.7rem; float: right;}
        
        .footer-links { text-align: center; margin-top: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .text-link { background: none; border: none; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
        .text-link.danger { color: var(--danger); }
        .text-link.muted { color: #999; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <header>
            <div style="display: flex; align-items: center; justify-content: center; position: relative;">
                <a href="index.html" style="position: absolute; left: 0; font-size: 1.5rem; text-decoration: none;">🏠</a>
            <h1>Eat Well</h1>
            </div>
            <h2>Unit 4 Sentence Builder</h2>
        </header>

        <div class="challenge-grid" id="challenge-list">
            <!-- Injected by JS -->
        </div>

        <div class="footer-links">
            <button class="text-link danger" onclick="app.showMistakes()">⚠ Review My Mistakes</button>
            <button class="text-link muted" onclick="app.showScoreHistory()">View score history</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="top-bar">
            <button class="close-btn" onclick="app.goHome()">✕</button>
            <div class="progress-container" id="progress-bar"></div>
        </div>

        <div class="question-area">
            <div class="prompt-container">
                <div class="prompt-cn" id="prompt-cn"></div>
                <button class="prompt-hint-btn" onclick="app.showHint()">💡</button>
                <div class="hint-text" id="hint-text"></div>
            </div>

            <div class="answer-area" id="answer-area"></div>
            <div class="word-pool" id="word-pool"></div>
        </div>

        <!-- Feedback Area -->
        <div id="feedback-area" class="feedback-area">
            <h3 id="feedback-title" style="margin:0"></h3>
            <p id="feedback-msg" style="margin:5px 0 0"></p>
        </div>

        <div class="footer-action">
            <button id="check-btn" class="check-btn" onclick="app.checkAnswer()">Check</button>
            <button id="next-btn" class="check-btn" onclick="app.nextQuestion()" style="display:none; background-color: var(--secondary); border-bottom-color: var(--secondary-dark);">Continue</button>
        </div>
    </div>

    <!-- Mistakes Modal -->
    <div id="mistakes-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="color:var(--danger)">Review Mistakes</h2>
                <button onclick="app.closeMistakes()" class="close-btn" style="color:#333">✕</button>
            </div>
            <div class="log-list" id="mistakes-list"></div>
            <div style="text-align: right;">
                <button class="text-link danger" onclick="app.clearMistakes()">Clear Mistakes</button>
            </div>
        </div>
    </div>

    <!-- Score History Modal -->
    <div id="history-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Score History</h2>
                <button onclick="app.closeScoreHistory()" class="close-btn" style="color:#333">✕</button>
            </div>
            <div class="log-list" id="history-list"></div>
            <div style="text-align: right; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                <button class="text-link danger" onclick="app.clearHistory()">Teacher: Clear All Data</button>
            </div>
        </div>
    </div>
</div>

<script>
    /* ---------------- DATA & CONTENT ---------------- */
    // Selective IPA for difficult/key vocabulary in this unit.
    const ipaDict = {
        "usually": "ˈjuːʒʊəli", "breakfast": "ˈbrekfəst", "sometimes": "ˈsʌmtaɪmz",
        "cabbage": "ˈkæbɪdʒ", "mutton": "ˈmʌtn", "restaurant": "ˈrestrɒnt",
        "anything": "ˈeniθɪŋ", "different": "ˈdɪfrənt", "healthy": "ˈhelθi",
        "vegetables": "ˈvedʒtəblz", "thirsty": "ˈθɜːsti", "weight": "weɪt",
        "energy": "ˈenədʒi", "balanced": "ˈbælənst", "sugar": "ˈʃʊɡə",
        "habit": "ˈhæbɪt", "delicious": "dɪˈlɪʃəs", "important": "ɪmˈpɔːtnt",
        "sleepy": "ˈsliːpi", "watermelon": "ˈwɔːtəmelən", "strawberry": "ˈstrɔːbəri",
        "hamburger": "ˈhæmbɜːɡə"
    };

    const challenges = [
        {
            id: 'c1', title: 'Daily Meals', icon: '🍳',
            data: [
                { en: "What do you usually have for breakfast?", cn: "你早餐通常吃什么？", hint: "Use 'usually' for daily routines. / 使用 'usually' 表示日常习惯。", noise: ["has", "is"] },
                { en: "I usually have some bread and milk.", cn: "我通常吃些面包和牛奶。", hint: "'Some' before uncountable nouns. / 'Some' 修饰不可数名词。", noise: ["a", "many"], accept: ["Usually I have some bread and milk."] },
                { en: "Sometimes I have eggs and beans.", cn: "有时我吃鸡蛋和豆子。", hint: "Plural forms for countable foods. / 可数食物使用复数形式。", noise: ["egg", "having"], accept: ["I sometimes have eggs and beans."] },
                { en: "Jane has lunch at school.", cn: "简在学校吃午饭。", hint: "Third-person singular verb 'has'. / 第三人称单数动词 'has'。", noise: ["have", "in"] },
                { en: "My family really likes pizza and salad.", cn: "我们家非常喜欢比萨和沙拉。", hint: "'Family' as a single unit takes 'likes'. / 'Family' 作为一个整体，谓语动词加 's'。", noise: ["like", "pizzas"] },
                { en: "We sometimes have ice cream for a treat.", cn: "我们有时会吃冰淇淋作为款待。", hint: "'for a treat' means as a special gift. / 'for a treat' 表示作为款待。", noise: ["treats", "in"] },
                { en: "What about noodles with beef and cabbage?", cn: "牛肉卷心菜面条怎么样？", hint: "'with' indicates ingredients. / 'with' 表示配料。", noise: ["for", "noodle"] },
                { en: "There is not any tea.", cn: "没有茶了。", hint: "'any' is used in negative sentences. / 'any' 用于否定句。", noise: ["some", "are"] },
                { en: "There is some watermelon juice.", cn: "还有一些西瓜汁。", hint: "'There is' for uncountable nouns. / 不可数名词用 'There is'。", noise: ["are", "any"] },
                { en: "Which would you like, beef or mutton?", cn: "你想要哪个，牛肉还是羊肉？", hint: "Use 'Which' to offer choices. / 使用 'Which' 提供选择。", noise: ["What", "and"] }
            ]
        },
        {
            id: 'c2', title: 'Ordering Food', icon: '📝',
            data: [
                { en: "Welcome to our restaurant!", cn: "欢迎来到我们的餐厅！", hint: "'Welcome to' + place. / 'Welcome to' + 地方。", noise: ["in", "for"] },
                { en: "What would you like to order?", cn: "您想点点什么？", hint: "'would like to' + verb. / 'would like to' + 动词原形。", noise: ["ordering", "do"] },
                { en: "Do you have anything with tofu?", cn: "你们有豆腐做的菜吗？", hint: "'anything' in questions. / 疑问句中用 'anything'。", noise: ["something", "has"] },
                { en: "Would you like a hot tofu dish?", cn: "您想要一份热的豆腐菜吗？", hint: "Adjective before noun. / 形容词修饰名词。", noise: ["dishs", "the"] },
                { en: "We often have it in America.", cn: "我们在美洲经常吃它。", hint: "Preposition 'in' for places. / 地方前用介词 'in'。", noise: ["on", "has"] },
                { en: "It may taste different here.", cn: "在这里它尝起来可能不同。", hint: "'taste' + adjective. / 'taste' + 形容词。", noise: ["tastes", "differently"] },
                { en: "I would like to try it.", cn: "我想尝尝它。", hint: "'would like to' + verb. / 'would like to' + 动词原形。", noise: ["trying", "am"] },
                { en: "We should also order a salad.", cn: "我们也应该点一份沙拉。", hint: "Modal verb 'should' + base verb. / 情态动词 'should' + 动词原形。", noise: ["orders", "to"] },
                { en: "Which soup would you like?", cn: "您想要哪种汤？", hint: "Question word 'Which'. / 疑问词 'Which'。", noise: ["What", "likes"] },
                { en: "Here is a menu for you.", cn: "这是给您的菜单。", hint: "'Here is' + singular noun. / 'Here is' + 单数名词。", noise: ["are", "to"] }
            ]
        },
        {
            id: 'c3', title: 'Countable & Uncountable', icon: '🥣',
            data: [
                { en: "Do you serve fish?", cn: "你们供应鱼肉吗？", hint: "'fish' as food is uncountable. / 作为食物的 'fish' 是不可数名词。", noise: ["fishs", "serves"] },
                { en: "Would you like the bill now?", cn: "您现在需要账单吗？", hint: "'the' specifies the bill. / 'the' 特指账单。", noise: ["a", "bills"] },
                { en: "I try to eat healthy food every day.", cn: "我试着每天吃健康的食物。", hint: "'try to' + base verb. / 'try to' + 动词原形。", noise: ["trying", "foods"] },
                { en: "I eat fruit and vegetables with every meal.", cn: "我每顿饭都吃水果和蔬菜。", hint: "'vegetables' is plural countable. / 'vegetables' 是可数名词复数。", noise: ["vegetable", "fruits"] },
                { en: "I do not eat sweets.", cn: "我不吃甜食。", hint: "'sweets' refers to candies. / 'sweets' 指糖果，用复数。", noise: ["sweet", "no"] },
                { en: "I have a pear and a banana.", cn: "我吃一个梨和一个香蕉。", hint: "'a' before consonant sounds. / 辅音发音前用 'a'。", noise: ["an", "pears"] },
                { en: "It is not good to drink too much juice.", cn: "喝太多果汁不好。", hint: "'too much' + uncountable noun. / 'too much' + 不可数名词。", noise: ["many", "juices"] },
                { en: "It usually has a lot of sugar.", cn: "它通常含有大量的糖。", hint: "'sugar' is uncountable. / 'sugar' 是不可数名词。", noise: ["sugars", "have"] },
                { en: "I drink water when I am thirsty.", cn: "我渴的时候喝水。", hint: "Conjunction 'when' connects clauses. / 连词 'when' 连接从句。", noise: ["what", "in"] },
                { en: "I should drink more water.", cn: "我应该多喝水。", hint: "'more' + uncountable noun. / 'more' + 不可数名词。", noise: ["many", "waters"] }
            ]
        },
        {
            id: 'c4', title: 'Healthy Habits', icon: '🏃‍♂️',
            data: [
                { en: "Healthy eating is important.", cn: "健康饮食很重要。", hint: "'eating' as gerund subject. / 动名词作主语。", noise: ["eat", "are"] },
                { en: "Fast food often has lots of salt.", cn: "快餐通常含有大量的盐。", hint: "'has' for third person singular. / 第三人称单数用 'has'。", noise: ["have", "salts"] },
                { en: "That makes us put on weight.", cn: "那会让我们体重增加。", hint: "'make someone do' / 'make + 宾语 + 动词原形'。", noise: ["makes", "putting"] },
                { en: "You can make healthy balanced meals.", cn: "你可以做健康均衡的饭菜。", hint: "Adjectives before plural noun. / 形容词修饰复数名词。", noise: ["meal", "making"] },
                { en: "Some people do not have breakfast.", cn: "有些人不吃早餐。", hint: "'have' means eat. / 'have' 意为吃。", noise: ["has", "no"] },
                { en: "Food gives us energy.", cn: "食物给我们提供能量。", hint: "'gives' for uncountable subject. / 不可数主语用 'gives'。", noise: ["give", "energies"] },
                { en: "It is easy to feel sleepy.", cn: "很容易感到困倦。", hint: "'It is easy to' + verb. / 'It is easy to' + 动词原形。", noise: ["feels", "sleep"] },
                { en: "An apple a day keeps the doctor away.", cn: "一天一苹果，医生远离我。", hint: "Classic proverb structure. / 经典谚语结构。", noise: ["A", "keep"] },
                { en: "You are what you eat.", cn: "人如其食。", hint: "Noun clause as predicative. / 名词性从句作表语。", noise: ["is", "eats"] },
                { en: "Why don't you have some fruit?", cn: "你为什么不吃点水果呢？", hint: "'Why don't you...' for advice. / 提建议用 'Why don't you...'", noise: ["does", "fruits"] }
            ]
        },
        {
            id: 'c5', title: 'Food Myths', icon: '🍎',
            data: [
                { en: "Only fruit and vegetables are healthy foods.", cn: "只有水果和蔬菜是健康的食物。", hint: "Plural 'are' for multiple subjects. / 多个主语用复数 'are'。", noise: ["is", "food"] },
                { en: "The human body needs to eat different foods.", cn: "人体需要吃不同的食物。", hint: "'needs to' + verb. / 'needs to' + 动词原形。", noise: ["need", "differently"] },
                { en: "Milk is good for our bones.", cn: "牛奶对我们的骨骼有益。", hint: "'be good for' means beneficial. / 'be good for' 表示对...有益。", noise: ["are", "bone"] },
                { en: "Eating fat is important for keeping us healthy.", cn: "吃脂肪对保持我们健康很重要。", hint: "'for' + -ing. / 介词 'for' + 动名词。", noise: ["eat", "keep"] },
                { en: "It gives us energy.", cn: "它给了我们能量。", hint: "Third person singular verb. / 第三人称单数动词。", noise: ["give", "energies"] },
                { en: "Not all fat makes us gain weight.", cn: "并非所有的脂肪都会让我们体重增加。", hint: "'gain weight' means get heavier. / 'gain weight' 意为长胖。", noise: ["gaining", "weights"] },
                { en: "It is necessary to include some fat.", cn: "摄入一些脂肪是必要的。", hint: "'It is necessary to' + verb. / 'It is necessary to' + 动词原形。", noise: ["includes", "a"] },
                { en: "Eating balanced meals is very important.", cn: "饮食均衡非常重要。", hint: "Gerund subject takes singular verb. / 动名词作主语，谓语动词用单数。", noise: ["are", "eat"] },
                { en: "It helps our brain to grow well.", cn: "它帮助我们的大脑良好发育。", hint: "'help... to do' / 'help... to do' 结构。", noise: ["help", "growing"], accept: ["It helps our brain grow well."] },
                { en: "It is best to develop good eating habits early.", cn: "最好早点养成良好的饮食习惯。", hint: "Adverb 'early' at the end. / 副词 'early' 放在句末。", noise: ["earlier", "habit"] }
            ]
        }
    ];

    /* ---------------- APP LOGIC ---------------- */
    const app = {
        state: {
            currentChallenge: null,
            queue: [],
            mistakeQueue: [], 
            currentIndex: 0,
            userSelection: [],
            currentObj: null,
            hintUsed: false,
            scoreLog: [], 
            locked: false
        },

        init: function() {
            this.renderHome();
        },

        /* --- Storage Helpers (Using Unique Keys for Unit 4) --- */
        getStats: function() { return JSON.parse(localStorage.getItem('sb_stats_unit4') || '{}'); },
        saveStats: function(stats) { localStorage.setItem('sb_stats_unit4', JSON.stringify(stats)); },
        getMistakes: function() { return JSON.parse(localStorage.getItem('sb_mistakes_unit4') || '[]'); },
        saveMistakes: function(list) { localStorage.setItem('sb_mistakes_unit4', JSON.stringify(list)); },
        getSessionLogs: function() { return JSON.parse(localStorage.getItem('sb_session_logs_u4') || '[]'); },
        saveSessionLog: function(log) { 
            const logs = this.getSessionLogs();
            logs.unshift(log); 
            localStorage.setItem('sb_session_logs_u4', JSON.stringify(logs));
        },

        /* --- Home Screen --- */
        renderHome: function() {
            document.getElementById('home-screen').classList.add('active');
            document.getElementById('game-screen').classList.remove('active');
            
            const list = document.getElementById('challenge-list');
            list.innerHTML = '';
            const allStats = this.getStats();
            const todayStr = new Date().toLocaleDateString();

            challenges.forEach(c => {
                let s = allStats[c.id] || { today: {date: todayStr, attempts: 0, best: 0}, lifetime: {attempts: 0, best: 0} };
                
                if(s.today.date !== todayStr) {
                    s.today = { date: todayStr, attempts: 0, best: 0 };
                }

                allStats[c.id] = s;

                const div = document.createElement('div');
                div.className = 'challenge-card';
                div.onclick = () => this.startChallenge(c.id);
                div.innerHTML = `
                    <div class="card-header">
                        <div style="display:flex; align-items:center;">
                            <span style="font-size:1.5rem; margin-right:10px;">${c.icon}</span>
                            <h3 class="card-title">${c.title}</h3>
                        </div>
                        <span style="color:var(--primary); font-weight:bold;">START</span>
                    </div>
                    <div class="card-stats">
                        <div class="stat-row"><span class="stat-label">TODAY</span> <span class="stat-val">${s.today.attempts} Runs | Best: ${s.today.best}%</span></div>
                        <div class="stat-row"><span class="stat-label">LIFETIME</span> <span class="stat-val">${s.lifetime.attempts} Runs | Best: ${s.lifetime.best}%</span></div>
                    </div>
                `;
                list.appendChild(div);
            });
            
            this.saveStats(allStats);
        },

        /* --- Game Loop --- */
        startChallenge: function(id) {
            const c = challenges.find(x => x.id === id);
            this.state.currentChallenge = c;
            this.state.queue = [...c.data]; 
            this.state.mistakeQueue = [];
            this.state.currentIndex = 0;
            this.state.scoreLog = new Array(c.data.length).fill(null);
            
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            this.renderProgress();
            this.loadQuestion();
        },

        loadQuestion: function() {
            let q = null;
            if (this.state.currentIndex < this.state.queue.length) {
                q = this.state.queue[this.state.currentIndex];
                this.state.isRedemption = false;
            } else if (this.state.mistakeQueue.length > 0) {
                q = this.state.mistakeQueue[0];
                this.state.isRedemption = true;
            } else {
                this.finishGame();
                return;
            }

            this.state.currentObj = q;
            this.state.userSelection = [];
            this.state.hintUsed = false;
            this.state.locked = false;

            document.getElementById('prompt-cn').innerText = q.cn;
            document.getElementById('hint-text').innerText = q.hint;
            document.getElementById('hint-text').classList.remove('visible');
            
            const feedback = document.getElementById('feedback-area');
            feedback.className = 'feedback-area'; 
            
            document.getElementById('check-btn').style.display = 'block';
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').className = 'check-btn';
            document.getElementById('next-btn').style.display = 'none';
            
            this.renderAnswerArea();
            this.generatePool(q);
        },

        generatePool: function(q) {
            const cleanEn = q.en.replace(/[.!?]$/, '');
            const correctWords = cleanEn.split(' ');
            let allWords = [...correctWords, ...q.noise];
            
            allWords.sort(() => Math.random() - 0.5);

            const pool = document.getElementById('word-pool');
            pool.innerHTML = '';
            
            allWords.forEach((word, idx) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                
                let displayWord = word;
                const alwaysCap = ["I", "Jane", "America", "Sunday", "Monday"];
                
                if (!alwaysCap.includes(displayWord)) {
                    displayWord = displayWord.toLowerCase();
                }

                const cleanWord = displayWord.toLowerCase().replace(/[^a-z]/g, '');
                const ipa = ipaDict[cleanWord];

                btn.innerHTML = `<span>${displayWord}</span>${ipa ? `<span class="ipa">[${ipa}]</span>` : ''}`;
                btn.onclick = () => this.selectWord(word, idx, btn); 
                btn.dataset.val = displayWord;
                pool.appendChild(btn);
            });
        },

        selectWord: function(word, id, btn) {
            if (this.state.locked) return;
            if(btn.classList.contains('selected')) return;
            
            this.state.userSelection.push({ text: btn.dataset.val, srcBtn: btn });
            btn.classList.add('selected');
            
            this.renderAnswerArea();
            this.updateCheckBtn();
        },

        removeWord: function(idx) {
            if (this.state.locked) return;
            const item = this.state.userSelection.splice(idx, 1)[0];
            item.srcBtn.classList.remove('selected');
            this.renderAnswerArea();
            this.updateCheckBtn();
        },

        renderAnswerArea: function() {
            const area = document.getElementById('answer-area');
            area.innerHTML = '';
            
            this.state.userSelection.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn-answer';
                
                let txt = item.text;
                if (idx === 0) {
                    txt = txt.charAt(0).toUpperCase() + txt.slice(1);
                }
                
                btn.innerText = txt;
                btn.onclick = () => this.removeWord(idx);
                area.appendChild(btn);
            });
        },

        showHint: function() {
            this.state.hintUsed = true;
            document.getElementById('hint-text').classList.add('visible');
        },

        updateCheckBtn: function() {
            document.getElementById('check-btn').disabled = this.state.userSelection.length === 0;
        },

        checkAnswer: function() {
            if (this.state.locked) return;
            if (this.state.userSelection.length === 0) return;
            
            let userSent = this.state.userSelection.map((item, idx) => {
                let t = item.text;
                if (idx === 0) t = t.charAt(0).toUpperCase() + t.slice(1);
                return t;
            }).join(' ');

            this.state.locked = true;

            const target = this.state.currentObj.en.replace(/[.!?]$/, '');
            let isCorrect = userSent === target; 
            
            if (!isCorrect && this.state.currentObj.accept) {
                isCorrect = this.state.currentObj.accept.some(alt => alt.replace(/[.!?]$/, '') === userSent);
            }
            
            const feedback = document.getElementById('feedback-area');
            const title = document.getElementById('feedback-title');
            const msg = document.getElementById('feedback-msg');
            const btn = document.getElementById('check-btn');

            if (isCorrect) {
                let scoreType = 'green';
                if (this.state.isRedemption) {
                    scoreType = 'redemption';
                } else {
                    if (this.state.hintUsed) scoreType = 'yellow';
                    this.state.scoreLog[this.state.currentIndex] = scoreType;
                }

                feedback.className = 'feedback-area correct visible';
                title.innerText = 'Excellent!';
                title.style.color = '#58cc02';
                msg.innerText = '';
                btn.className = 'check-btn correct';

                if(this.state.isRedemption) this.state.mistakeQueue.shift();

            } else {
                feedback.className = 'feedback-area wrong visible';
                title.innerText = 'Correct Answer:';
                title.style.color = '#ea2b2b';
                msg.innerText = this.state.currentObj.en;
                btn.className = 'check-btn wrong';

                if (!this.state.isRedemption) {
                    this.state.scoreLog[this.state.currentIndex] = 'red';
                    this.state.mistakeQueue.push(this.state.currentObj);
                    this.logMistake(this.state.currentObj, userSent);
                } else {
                    this.state.mistakeQueue.push(this.state.mistakeQueue.shift());
                }
            }

            this.renderProgress();
            btn.style.display = 'none';
            const nextBtn = document.getElementById('next-btn');
            nextBtn.style.display = 'block';

            let isLast = false;
            if (this.state.isRedemption) {
                if (this.state.mistakeQueue.length === 0) isLast = true;
            } else {
                if (this.state.currentIndex >= this.state.queue.length - 1 && this.state.mistakeQueue.length === 0) {
                    isLast = true;
                }
            }

            if(isLast) {
                nextBtn.innerText = "Finish";
                nextBtn.style.backgroundColor = "var(--primary)";
                nextBtn.style.borderBottomColor = "var(--primary-dark)";
            } else {
                nextBtn.innerText = "Continue";
                nextBtn.style.backgroundColor = "var(--secondary)";
                nextBtn.style.borderBottomColor = "var(--secondary-dark)";
            }
        },

        nextQuestion: function() {
            if (!this.state.isRedemption) this.state.currentIndex++;
            this.loadQuestion();
        },

        renderProgress: function() {
            const bar = document.getElementById('progress-bar');
            bar.innerHTML = '';
            for(let i=0; i<10; i++) {
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                const s = this.state.scoreLog[i];
                if(s) seg.classList.add(s);
                bar.appendChild(seg);
            }
        },

        finishGame: function() {
            const total = this.state.scoreLog.reduce((acc, curr) => {
                if (curr === 'green') return acc + 10;
                if (curr === 'yellow') return acc + 5;
                return acc;
            }, 0);
            
            const wrongQuestions = [];
            this.state.scoreLog.forEach((status, index) => {
                if (status === 'red' && this.state.queue[index]) {
                    wrongQuestions.push(this.state.queue[index]);
                }
            });

            const allStats = this.getStats();
            const cid = this.state.currentChallenge.id;
            
            if (!allStats[cid]) {
                allStats[cid] = { today: {date: new Date().toLocaleDateString(), attempts: 0, best: 0}, lifetime: {attempts: 0, best: 0} };
            }
            const s = allStats[cid];
            
            s.today.attempts++;
            if (total > s.today.best) s.today.best = total;
            
            s.lifetime.attempts++;
            if (total > s.lifetime.best) s.lifetime.best = total;
            
            allStats[cid] = s;
            this.saveStats(allStats);

            this.saveSessionLog({
                date: new Date().toLocaleString(),
                challenge: this.state.currentChallenge.title,
                score: total
            });

            let mistakeHtml = '';
            if (wrongQuestions.length > 0) {
                mistakeHtml = `<div style="width:100%; text-align:left; background:#fff; border-radius:12px; padding:15px; margin:20px 0; max-height:300px; overflow-y:auto; border:2px solid var(--neutral);">
                    <h3 style="color:var(--danger); margin-top:0; border-bottom:1px solid #eee; padding-bottom:5px;">Review Mistakes:</h3>
                    ${wrongQuestions.map(q => `
                        <div style="margin-bottom:10px; border-bottom:1px solid #f0f0f0; padding-bottom:5px;">
                            <div style="font-weight:bold; color:#555;">${q.cn}</div>
                            <div style="color:var(--secondary-dark); font-weight:bold;">${q.en}</div>
                        </div>
                    `).join('')}
                </div>`;
            } else {
                mistakeHtml = `<div style="margin:20px 0; color:var(--primary); font-weight:bold; font-size:1.2rem;">🎉 Perfect Run! No mistakes.</div>`;
            }

            document.getElementById('game-screen').innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:20px;">
                    <h1 style="color:var(--primary); font-size:3rem; margin:0;">${total}%</h1>
                    <h2 style="margin:5px 0 20px 0; color:#555;">Challenge Complete!</h2>
                    
                    ${mistakeHtml}

                    <button onclick="location.reload()" class="check-btn" style="width:100%; max-width:300px;">Back to Challenges</button>
                </div>
            `;
        },

        /* --- Mistake Logic --- */
        logMistake: function(qObj, userAns) {
            const list = this.getMistakes();
            const existing = list.find(m => m.en === qObj.en);
            if(existing) {
                existing.count++;
                existing.wrong = userAns;
                existing.timestamp = Date.now();
                const idx = list.indexOf(existing);
                list.splice(idx, 1);
                list.unshift(existing);
            } else {
                list.unshift({
                    en: qObj.en, cn: qObj.cn, wrong: userAns, count: 1, 
                    timestamp: Date.now(), challenge: this.state.currentChallenge.title
                });
            }
            this.saveMistakes(list);
        },

        showMistakes: function() {
            const list = this.getMistakes();
            const container = document.getElementById('mistakes-list');
            container.innerHTML = '';
            
            if(list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">No mistakes yet! Great job!</div>';
            } else {
                list.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'mistake-item';
                    div.innerHTML = `
                        <div style="font-size:0.8rem; color:#999; margin-bottom:5px;">
                            ${new Date(m.timestamp).toLocaleDateString()} - ${m.challenge}
                            <span class="fail-count">Failed ${m.count}x</span>
                        </div>
                        <div style="font-weight:bold; color:#333; margin-bottom:3px;">${m.cn}</div>
                        <div style="color:var(--danger); text-decoration:line-through; font-size:0.9rem;">${m.wrong || '(No answer)'}</div>
                        <div style="color:var(--secondary-dark); font-weight:bold; font-size:0.9rem;">${m.en}</div>
                    `;
                    container.appendChild(div);
                });
            }
            document.getElementById('mistakes-modal').style.display = 'flex';
        },

        closeMistakes: function() {
            document.getElementById('mistakes-modal').style.display = 'none';
        },

        clearMistakes: function() {
            const code = prompt("Enter Teacher Passcode:");
            // Passcode: First letter of each challenge: D O C H F
            if(code && code.toUpperCase() === 'DOCHF') {
                localStorage.removeItem('sb_mistakes_unit4');
                this.showMistakes();
            } else {
                alert("Incorrect Passcode");
            }
        },

        /* --- Score History Logic --- */
        showScoreHistory: function() {
            const list = this.getSessionLogs();
            const container = document.getElementById('history-list');
            container.innerHTML = '';

            if(list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">No games played yet.</div>';
            } else {
                list.forEach(l => {
                    const div = document.createElement('div');
                    div.className = 'mistake-item'; 
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong style="color:#333;">${l.challenge}</strong>
                            <span style="font-weight:bold; color:var(--primary);">${l.score}%</span>
                        </div>
                        <div style="font-size:0.8rem; color:#999;">${l.date}</div>
                    `;
                    container.appendChild(div);
                });
            }
            document.getElementById('history-modal').style.display = 'flex';
        },

        closeScoreHistory: function() {
            document.getElementById('history-modal').style.display = 'none';
        },

        clearHistory: function() {
            const code = prompt("Enter Teacher Passcode:");
            // Passcode: First letter of each challenge: D O C H F
            if(code && code.toUpperCase() === 'DOCHF') {
                localStorage.removeItem('sb_stats_unit4');
                localStorage.removeItem('sb_session_logs_u4');
                localStorage.removeItem('sb_mistakes_unit4');
                location.reload();
            } else {
                alert("Incorrect Passcode");
            }
        },
        
        goHome: function() {
            if(confirm("Exit? Progress will be lost.")) location.reload();
        }
    };

    window.onload = function() { app.init(); };

</script>
</body>
</html>
