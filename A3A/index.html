<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3A Practices Index</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .section {
            margin-bottom: 40px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 8px;
        }
        a {
            text-decoration: none;
            color: #0366d6;
        }
        a:hover {
            text-decoration: underline;
        }
        /* Tree styles */
        .tree ul {
            padding-left: 20px;
        }
        .tree li {
            position: relative;
        }
        .folder {
            font-weight: bold;
            color: #444;
            cursor: pointer;
        }
        .folder-toggle {
            cursor: pointer;
        }
        .file-count {
            font-weight: normal;
            font-style: italic;
            color: #888;
        }
        .collapsed {
            display: none;
        }
    </style>
</head>
<body>
    <h1>A3A Practices</h1>
    <p><a href="../index.html">Back to Main Index</a></p>
    <div class="section">
        <h2>Files in this folder</h2>
        <div class="tree"><ul>
            <li><span class="folder folder-toggle">A3A-U6</span> <span class="file-count"></span>
                <ul class="collapsed">
                    <li><a href="a3a-u6-sentence-architect.html">a3a-u6-sentence-architect.html</a></li>
                </ul>
            </li>
        </ul></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const folders = document.querySelectorAll('.folder-toggle');

            folders.forEach(folder => {
                const sublist = folder.nextElementSibling.nextElementSibling;
                if (sublist && sublist.tagName === 'UL') {
                    const fileCount = sublist.children.length;
                    const fileCountSpan = folder.nextElementSibling;
                    fileCountSpan.textContent = `(${fileCount} files)`;

                    folder.addEventListener('click', () => {
                        sublist.classList.toggle('collapsed');
                    });
                }
            });
        });
    </script>
</body>
</html>
