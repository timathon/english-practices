<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAZ-B Practices Index</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .section {
            margin-bottom: 40px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 8px;
        }
        a {
            text-decoration: none;
            color: #0366d6;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        /* Tree styles */
        .tree ul {
            padding-left: 20px;
        }
        .tree li {
            position: relative;
        }
        .folder {
            font-weight: bold;
            color: #444;
            cursor: pointer;
        }
        .folder-toggle {
            cursor: pointer;
        }
        .file-count {
            font-weight: normal;
            font-style: italic;
            color: #888;
        }
        .group-container {
            display: flex;
            align-items: flex-start;
            margin: 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
            margin-left: -20px;
        }
        .group-label {
            width: 80px;
            flex-shrink: 0;
            font-size: 0.85em;
            color: #999;
            font-weight: bold;
            text-transform: uppercase;
            padding-top: 2px;
        }
        .group-links {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .collapsed {
            display: none;
        }
    </style>
</head>
<body>
    <h1>RAZ-B Practices</h1>
    <p><a href="../index.html">← Back to Parent Index</a></p>
    <div class="section">
        <h2>Files and Folders</h2>
        <div class="tree"><ul>
            <li><a href="A-Cold-Day-Sentence-Builder.html">A Cold Day Sentence Builder</a></li>
            <li><a href="After-School-Sentence-Builder.html">After School Sentence Builder</a></li>
            <li><a href="Go-Animals-Go-Sentence-Builder.html">Go Animals Go Sentence Builder</a></li>
            <li><a href="The-Picnic-Sentence-Architect.html">The Picnic Sentence Architect</a></li>
        </ul></div>
    </div>

    <script>
        function saveLastUnit(unit) {
            localStorage.setItem('last-unit-' + window.location.pathname, unit);
            localStorage.setItem('last-unit-latest', unit);
        }

        document.addEventListener('DOMContentLoaded', function () {
            const folders = document.querySelectorAll('.folder-toggle');
            const latestUnit = localStorage.getItem('last-unit-latest');
            let lastUnit = localStorage.getItem('last-unit-' + window.location.pathname);
            
            // If the latest unit clicked anywhere belongs to this index, use it!
            if (latestUnit && document.querySelector(`[data-unit="${latestUnit}"]`)) {
                lastUnit = latestUnit;
            }

            folders.forEach(folder => {
                const sublist = folder.nextElementSibling.nextElementSibling;
                if (sublist && sublist.tagName === 'UL') {
                    const fileCount = Array.from(sublist.querySelectorAll('a')).filter(a => a.closest('ul') === sublist).length + 
                                      Array.from(sublist.querySelectorAll('.folder-toggle')).filter(f => f.closest('ul') === sublist).length;
                    
                    const fileCountSpan = folder.nextElementSibling;
                    fileCountSpan.textContent = `(${fileCount} items)`;

                    const unit = folder.getAttribute('data-unit');
                    if (unit === lastUnit) {
                        sublist.classList.remove('collapsed');
                        let parent = sublist.parentElement;
                        while (parent && parent.tagName !== 'BODY') {
                            if (parent.tagName === 'UL') parent.classList.remove('collapsed');
                            parent = parent.parentElement;
                        }
                    }

                    folder.addEventListener('click', () => {
                        sublist.classList.toggle('collapsed');
                        if (!sublist.classList.contains('collapsed')) {
                            saveLastUnit(unit);
                        } else if (localStorage.getItem('last-unit-' + window.location.pathname) === unit) {
                            localStorage.removeItem('last-unit-' + window.location.pathname);
                            if (localStorage.getItem('last-unit-latest') === unit) {
                                localStorage.removeItem('last-unit-latest');
                            }
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
