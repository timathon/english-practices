<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>book-reviews Practices Index</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .section {
            margin-bottom: 40px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 8px;
        }
        a {
            text-decoration: none;
            color: #0366d6;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        /* Tree styles */
        .tree ul {
            padding-left: 20px;
        }
        .tree li {
            position: relative;
        }
        .folder {
            font-weight: bold;
            color: #444;
            cursor: pointer;
        }
        .folder-toggle {
            cursor: pointer;
        }
        .file-count {
            font-weight: normal;
            font-style: italic;
            color: #888;
        }
        .collapsed {
            display: none;
        }
    </style>
</head>
<body>
    <h1>book-reviews Practices</h1>
    <p><a href="../index.html">← Back to Parent Index</a></p>
    <div class="section">
        <h2>Files and Folders</h2>
        <div class="tree"><ul>
            <li><a href="Einstein.html">Einstein.html</a></li>
            <li><a href="Tesla.html">Tesla.html</a></li>
        </ul></div>
    </div>

    <script>
        function saveLastUnit(unit) {
            localStorage.setItem('last-unit-' + window.location.pathname, unit);
        }

        document.addEventListener('DOMContentLoaded', function () {
            const folders = document.querySelectorAll('.folder-toggle');
            const lastUnit = localStorage.getItem('last-unit-' + window.location.pathname);

            folders.forEach(folder => {
                const sublist = folder.nextElementSibling.nextElementSibling;
                if (sublist && sublist.tagName === 'UL') {
                    const fileCount = Array.from(sublist.children).reduce((acc, child) => {
                        if (child.querySelector('a')) return acc + 1;
                        if (child.querySelector('.folder-toggle')) return acc + 1;
                        return acc;
                    }, 0);
                    
                    const fileCountSpan = folder.nextElementSibling;
                    fileCountSpan.textContent = `(${fileCount} items)`;

                    const unit = folder.getAttribute('data-unit');
                    if (unit === lastUnit) {
                        sublist.classList.remove('collapsed');
                        let parent = sublist.parentElement;
                        while (parent && parent.tagName !== 'BODY') {
                            if (parent.tagName === 'UL') parent.classList.remove('collapsed');
                            parent = parent.parentElement;
                        }
                    }

                    folder.addEventListener('click', () => {
                        sublist.classList.toggle('collapsed');
                        if (!sublist.classList.contains('collapsed')) {
                            saveLastUnit(unit);
                        } else if (localStorage.getItem('last-unit-' + window.location.pathname) === unit) {
                            localStorage.removeItem('last-unit-' + window.location.pathname);
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
